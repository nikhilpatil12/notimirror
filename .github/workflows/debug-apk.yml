name: Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Install Gradle directly — avoids needing gradle-wrapper.jar in the repo
      - name: Install Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Read app version
        if: github.event_name != 'pull_request'
        id: app_version
        shell: bash
        run: |
          version_name=$(sed -n 's/.*versionName = "\(.*\)".*/\1/p' app/build.gradle.kts | head -n 1)
          version_code=$(sed -n 's/.*versionCode = \([0-9]\+\).*/\1/p' app/build.gradle.kts | head -n 1)
          if [[ -z "$version_name" || -z "$version_code" ]]; then
            echo "Failed to read app version from app/build.gradle.kts" >&2
            exit 1
          fi
          echo "name=$version_name" >> "$GITHUB_OUTPUT"
          echo "code=$version_code" >> "$GITHUB_OUTPUT"
          echo "tag=v$version_name" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.app_version.outputs.tag }}
          name: "NotiMirror v${{ steps.app_version.outputs.name }}"
          body: |
            Automated debug APK build for NotiMirror v${{ steps.app_version.outputs.name }} (${{ steps.app_version.outputs.code }}).

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Run:** #${{ github.run_number }}
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          fail_on_unmatched_files: true
          make_latest: true
